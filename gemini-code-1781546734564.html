<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOAN AAS OS - Cổng Đăng Nhập</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-slate-900 h-screen flex items-center justify-center relative overflow-hidden">
    <div class="absolute top-0 left-0 w-full h-full overflow-hidden z-0 pointer-events-none">
        <div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-blue-600/20 blur-[100px] rounded-full"></div>
        <div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-rose-600/20 blur-[100px] rounded-full"></div>
    </div>

    <div class="bg-slate-800/80 backdrop-blur-xl p-10 rounded-3xl shadow-2xl border border-slate-700 w-full max-w-md z-10 relative">
        <div class="text-center mb-8">
            <div class="h-16 w-16 bg-gradient-to-tr from-blue-600 to-indigo-600 rounded-2xl flex items-center justify-center text-white text-3xl mx-auto mb-4 shadow-lg shadow-blue-500/30">
                <i class="fas fa-layer-group"></i>
            </div>
            <h1 class="text-3xl font-black text-white tracking-tight">TOAN AAS <span class="font-light text-blue-400">OS</span></h1>
            <p class="text-slate-400 text-sm mt-2">Hệ sinh thái Quản trị & AI Doanh nghiệp</p>
        </div>

        <div class="space-y-5">
            <div>
                <label class="block text-sm font-semibold text-slate-300 mb-2">Mã ID Telegram của bạn</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none"><i class="fab fa-telegram text-blue-400 text-lg"></i></div>
                    <input type="text" id="telegram-id" class="w-full bg-slate-900/50 border border-slate-600 text-white rounded-xl py-3 pl-12 pr-4 outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition placeholder-slate-500" placeholder="VD: 123456789">
                </div>
                <p class="text-[11px] text-slate-500 mt-2"><i class="fas fa-info-circle mr-1"></i>Vào Bot Telegram gõ /start để lấy ID nếu chưa có.</p>
            </div>

            <button onclick="login()" id="btn-login" class="w-full py-3.5 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-xl shadow-lg shadow-blue-500/30 transition flex items-center justify-center">
                Đăng Nhập Hệ Thống <i class="fas fa-arrow-right ml-2"></i>
            </button>
        </div>

        <div id="error-msg" class="mt-4 text-center text-rose-400 text-sm font-medium hidden"></div>
    </div>

    <script>
        // Xóa sạch session cũ khi vào trang login
        localStorage.clear();

        async function login() {
            const userId = document.getElementById('telegram-id').value.trim();
            const btn = document.getElementById('btn-login');
            const errorMsg = document.getElementById('error-msg');
            
            if(!userId) {
                errorMsg.innerText = "Vui lòng nhập ID Telegram!";
                errorMsg.classList.remove('hidden');
                return;
            }

            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';
            btn.disabled = true;
            errorMsg.classList.add('hidden');

            try {
                // Gọi API xác thực
                const res = await fetch('/api/v1/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user_id: userId })
                });
                const data = await res.json();

                if(data.success) {
                    // Lưu thông tin vào trình duyệt
                    localStorage.setItem('user_id', data.user_id);
                    localStorage.setItem('username', data.username);
                    localStorage.setItem('role', data.role);

                    // Điều hướng thông minh
                    if(data.role === 'admin') {
                        window.location.href = '/admin-app'; // Sếp vào thẳng Admin
                    } else {
                        window.location.href = '/'; // Khách vào trang Customer
                    }
                } else {
                    errorMsg.innerText = data.message;
                    errorMsg.classList.remove('hidden');
                    btn.innerHTML = 'Đăng Nhập Hệ Thống <i class="fas fa-arrow-right ml-2"></i>';
                    btn.disabled = false;
                }
            } catch(e) {
                errorMsg.innerText = "Lỗi kết nối đến Server!";
                errorMsg.classList.remove('hidden');
                btn.innerHTML = 'Đăng Nhập Hệ Thống <i class="fas fa-arrow-right ml-2"></i>';
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
