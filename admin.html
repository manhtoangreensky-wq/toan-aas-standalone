<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOAN AAS - Quản Trị Hệ Thống</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-slate-50 flex h-screen overflow-hidden">
    
    <div class="w-64 bg-slate-900 text-white flex flex-col h-full shadow-2xl z-10">
        <div class="p-6 border-b border-slate-800">
            <h2 class="text-xl font-bold text-blue-400"><i class="fas fa-shield-halved mr-2"></i>ERP ADMIN</h2>
        </div>
        <div class="flex-1 p-4 overflow-y-auto">
            <ul class="space-y-2 text-sm font-medium">
                <li><a href="/" class="block p-3 rounded-lg hover:bg-slate-800 text-slate-300 transition"><i class="fas fa-home w-6"></i>Về Trang Chủ</a></li>
                <li><a href="#" class="block p-3 rounded-lg bg-blue-600 text-white shadow-lg"><i class="fas fa-users w-6"></i>Quản Lý Khách Hàng</a></li>
            </ul>
        </div>
    </div>

    <div class="flex-1 flex flex-col h-full overflow-hidden bg-slate-50">
        <div class="bg-white shadow p-4 flex justify-between items-center border-b z-0">
            <h1 class="text-xl font-bold text-slate-800">Danh Sách Tài Khoản Hệ Thống</h1>
            <span class="text-sm bg-blue-100 text-blue-800 px-3 py-1 rounded-full font-bold shadow-sm">Master Panel</span>
        </div>
        
        <div class="flex-1 overflow-auto p-6">
            <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                <table class="min-w-full text-left text-sm whitespace-nowrap">
                    <thead class="uppercase tracking-wider border-b-2 border-slate-200 bg-slate-50 text-slate-600 font-semibold">
                        <tr>
                            <th class="px-6 py-4">Tài khoản</th>
                            <th class="px-6 py-4 text-center">Quyền hạn</th>
                            <th class="px-6 py-4 text-right">Số dư ví (Xu)</th>
                        </tr>
                    </thead>
                    <tbody id="user-list" class="divide-y divide-slate-100 text-slate-700">
                        <tr><td colspan="3" class="px-6 py-8 text-center text-slate-500"><i class="fas fa-spinner fa-spin mr-2"></i>Đang tải dữ liệu...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const admin_id = localStorage.getItem('user_id');
        const role = localStorage.getItem('role');

        // KIỂM TRA QUYỀN TRỰC TIẾP
        if (role !== 'admin') {
            document.body.innerHTML = `
                <div class="w-full h-screen flex items-center justify-center bg-gray-100">
                    <div class="text-center p-8 bg-white rounded-xl shadow-xl border-t-4 border-red-500">
                        <i class="fas fa-lock fa-4x text-red-500 mb-4"></i>
                        <h1 class="text-2xl font-bold text-gray-800">Truy Cập Bị Từ Chối</h1>
                        <p class="mt-2 text-gray-600">Tài khoản của sếp chưa được cấp quyền Admin trong Database.</p>
                        <a href="/" class="mt-6 inline-block bg-blue-600 text-white font-bold py-2 px-6 rounded shadow hover:bg-blue-700">Về Trang Chủ</a>
                    </div>
                </div>`;
        } else {
            loadUsers();
        }

        async function loadUsers() {
            try {
                const res = await fetch(`/api/v1/admin/users?admin_id=${admin_id}`);
                const data = await res.json();
                
                const tbody = document.getElementById('user-list');
                if (data.success && data.data.length > 0) {
                    tbody.innerHTML = data.data.map(u => `
                        <tr class="hover:bg-slate-50 transition">
                            <td class="px-6 py-4 font-bold text-slate-800">${u.username}</td>
                            <td class="px-6 py-4 text-center"><span class="${u.role==='admin'?'bg-red-100 text-red-700 border border-red-200':'bg-slate-100 text-slate-600 border border-slate-200'} px-3 py-1 rounded-full text-xs font-bold uppercase">${u.role}</span></td>
                            <td class="px-6 py-4 text-right font-bold text-emerald-600 text-lg">${u.credits.toLocaleString('vi-VN')}</td>
                        </tr>
                    `).join('');
                } else {
                    tbody.innerHTML = '<tr><td colspan="3" class="px-6 py-8 text-center text-slate-500">Hệ thống chưa có khách hàng nào.</td></tr>';
                }
            } catch (e) {
                console.error(e);
                document.getElementById('user-list').innerHTML = '<tr><td colspan="3" class="px-6 py-8 text-center text-red-500 font-bold">Lỗi kết nối đến máy chủ!</td></tr>';
            }
        }
    </script>
</body>
</html>
