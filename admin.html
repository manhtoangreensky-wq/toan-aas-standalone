<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOAN AAS - Enterprise ERP OS (FINAL)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; } .custom-scrollbar::-webkit-scrollbar { width: 4px; } .custom-scrollbar::-webkit-scrollbar-thumb { background-color: #475569; border-radius: 20px; }</style>
</head>
<body class="bg-slate-50 flex h-screen overflow-hidden text-sm">
    
    <div class="w-64 bg-[#0f172a] text-slate-300 flex flex-col h-full shadow-2xl z-20 flex-shrink-0">
        <div class="p-5 border-b border-slate-700 flex items-center gap-3">
            <div class="bg-blue-600 p-2 rounded-lg text-white"><i class="fas fa-layer-group"></i></div>
            <h2 class="text-lg font-bold text-white tracking-wide">TOAN AAS <span class="text-blue-400 font-normal">ERP</span></h2>
        </div>
        <div class="flex-1 overflow-y-auto custom-scrollbar p-3 pb-20">
            <ul class="space-y-1">
                <li class="mb-4"><button onclick="switchTab('dashboard')" id="nav-dashboard" class="w-full flex items-center gap-3 p-3 rounded-lg bg-blue-600 text-white transition group"><i class="fas fa-chart-pie w-5 text-center"></i><span class="font-medium">Bảng điều khiển</span></button></li>
                
                <li class="text-[10px] font-bold text-slate-500 uppercase tracking-wider px-3 mb-2 mt-4">Phân hệ Hệ thống</li>
                <li><button onclick="switchTab('topup'); loadManualOrders();" id="nav-topup" class="w-full flex items-center gap-3 p-3 rounded-lg hover:bg-slate-800 hover:text-white transition"><i class="fas fa-money-check-alt w-5 text-center text-emerald-400"></i><span class="font-bold text-emerald-400">Duyệt Nạp Xu</span></button></li>
                
                <li><button onclick="switchTab('crm')" id="nav-crm" class="w-full flex items-center gap-3 p-3 rounded-lg hover:bg-slate-800 hover:text-white transition"><i class="fas fa-handshake w-5 text-center text-blue-400"></i><span>Khách hàng CRM</span></button></li>
                <li><button onclick="switchTab('projects')" id="nav-projects" class="w-full flex items-center gap-3 p-3 rounded-lg hover:bg-slate-800 hover:text-white transition"><i class="fas fa-hard-hat w-5 text-center text-yellow-400"></i><span>Quản lý Dự án</span></button></li>
            </ul>
        </div>
        <div class="p-4 border-t border-slate-700 bg-[#0f172a] absolute bottom-0 w-64">
            <button onclick="logout()" class="flex items-center justify-center gap-2 w-full p-2 bg-slate-800 hover:bg-red-600 text-white rounded-lg transition font-medium"><i class="fas fa-sign-out-alt"></i> Về trang Chủ</button>
        </div>
    </div>

    <div class="flex-1 flex flex-col h-full bg-slate-50 overflow-hidden relative">
        <header class="bg-white shadow-sm h-16 flex items-center justify-between px-6 z-10 flex-shrink-0 border-b border-slate-200">
            <h1 class="text-xl font-bold text-slate-800" id="header-title">Bảng điều khiển</h1>
        </header>

        <main class="flex-1 overflow-auto p-6 relative" id="main-content">
            <div id="tab-dashboard" class="tab-panel block">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-6">
                    <div class="bg-white rounded-xl shadow-sm border p-5"><h3 class="text-2xl font-bold text-slate-800" id="stat-projects">0</h3><p class="text-slate-500">Dự án Đang chạy</p></div>
                    <div class="bg-white rounded-xl shadow-sm border p-5"><h3 class="text-2xl font-bold text-emerald-600">Bình thường</h3><p class="text-slate-500">Trạng thái Server</p></div>
                </div>
            </div>

            <div id="tab-topup" class="tab-panel hidden h-full">
                <div class="flex justify-between items-center mb-6"><h2 class="text-lg font-bold text-slate-800">Duyệt Đơn Nạp Thủ Công</h2></div>
                <div class="bg-white rounded-xl shadow-sm border overflow-hidden">
                    <table class="min-w-full text-left text-sm">
                        <thead class="bg-slate-50 border-b">
                            <tr><th class="px-6 py-4">Khách hàng</th><th class="px-6 py-4 text-right">Số tiền nạp</th><th class="px-6 py-4 text-center">TxID (Mã GD)</th><th class="px-6 py-4 text-center">Trạng thái</th><th class="px-6 py-4 text-center">Hành động</th></tr>
                        </thead>
                        <tbody id="topup-list" class="divide-y text-slate-700">
                            </tbody>
                    </table>
                </div>
            </div>

            <div id="tab-crm" class="tab-panel hidden h-full"><div class="bg-white rounded-xl p-6 shadow border"><h3 class="font-bold mb-4">Cơ sở dữ liệu Khách hàng</h3><p class="text-slate-500">Dữ liệu CRM hiển thị tại đây.</p></div></div>
            <div id="tab-projects" class="tab-panel hidden h-full"><div class="bg-white rounded-xl p-6 shadow border"><h3 class="font-bold mb-4">Dự án ELV</h3><p class="text-slate-500">Dữ liệu dự án hiển thị tại đây.</p></div></div>
        </main>
    </div>

    <script>
        function logout() { window.location.href = '/'; }
        const titles = {'dashboard':'Tổng Quan', 'topup':'Duyệt Đơn Nạp Xu', 'crm':'Khách Hàng', 'projects':'Dự Án B2B'};
        
        function switchTab(tabId) {
            document.getElementById('header-title').innerText = titles[tabId];
            document.querySelectorAll('[id^="nav-"]').forEach(el => el.className = "w-full flex items-center gap-3 p-3 rounded-lg hover:bg-slate-800 hover:text-white transition group");
            const act = document.getElementById('nav-'+tabId); 
            if(act) act.className = "w-full flex items-center gap-3 p-3 rounded-lg bg-blue-600 text-white shadow-md transition group";
            
            document.querySelectorAll('.tab-panel').forEach(el => el.classList.add('hidden'));
            document.getElementById('tab-'+tabId).classList.remove('hidden'); 
        }

        // HÀM CALL API DUYỆT ĐƠN NẠP THỦ CÔNG
        async function loadManualOrders() {
            const box = document.getElementById('topup-list');
            box.innerHTML = '<tr><td colspan="5" class="text-center py-4"><i class="fas fa-spinner fa-spin mr-2"></i>Đang tải dữ liệu...</td></tr>';
            try {
                const res = await fetch('/api/v1/customer/admin/manual-orders');
                const data = await res.json();
                if(data.success && data.data.length > 0) {
                    box.innerHTML = data.data.map(o => `
                        <tr>
                            <td class="px-6 py-4"><b>${o.username}</b><br><span class="text-[10px] text-slate-500">ID: ${o.user_id}</span></td>
                            <td class="px-6 py-4 text-right font-bold text-emerald-600">${o.amount.toLocaleString()}đ<br><span class="text-[10px] text-slate-500">+${o.xu.toLocaleString()} Xu</span></td>
                            <td class="px-6 py-4 text-center"><code class="bg-slate-100 px-2 py-1 rounded text-xs">${o.txid}</code><br><span class="text-[10px]">${o.method}</span></td>
                            <td class="px-6 py-4 text-center">
                                ${o.status === 'pending' ? '<span class="px-2 py-1 bg-orange-100 text-orange-600 text-xs font-bold rounded">Chờ duyệt</span>' : (o.status === 'approved' ? '<span class="px-2 py-1 bg-emerald-100 text-emerald-600 text-xs font-bold rounded">Đã duyệt</span>' : '<span class="px-2 py-1 bg-red-100 text-red-600 text-xs font-bold rounded">Đã hủy</span>')}
                            </td>
                            <td class="px-6 py-4 text-center">
                                ${o.status === 'pending' ? `
                                    <button onclick="approveOrder(${o.id}, 'approve')" class="px-3 py-1 bg-emerald-600 text-white rounded text-xs font-bold mr-1">Duyệt</button>
                                    <button onclick="approveOrder(${o.id}, 'reject')" class="px-3 py-1 bg-red-600 text-white rounded text-xs font-bold">Hủy</button>
                                ` : '-'}
                            </td>
                        </tr>
                    `).join('');
                } else box.innerHTML = '<tr><td colspan="5" class="text-center py-4 text-slate-500">Chưa có đơn nạp thủ công nào.</td></tr>';
            } catch(e) { box.innerHTML = '<tr><td colspan="5" class="text-center py-4 text-red-500">Lỗi kết nối.</td></tr>'; }
        }

        async function approveOrder(id, action) {
            if(!confirm(`Bạn chắc chắn muốn ${action === 'approve' ? 'DUYỆT' : 'HỦY'} đơn này?`)) return;
            try {
                const res = await fetch('/api/v1/customer/admin/approve-topup', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ order_id: id, action: action })
                });
                const data = await res.json();
                alert(data.message);
                loadManualOrders(); // Tải lại bảng
            } catch(e) { alert('Lỗi mạng!'); }
        }

        document.addEventListener('DOMContentLoaded', () => { switchTab('dashboard'); });
    </script>
</body>
</html>
