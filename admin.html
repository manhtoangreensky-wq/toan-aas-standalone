<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOAN AAS - Quản Trị Khách Hàng</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gray-100 text-gray-800 font-sans min-h-screen">
    
    <nav class="bg-gray-900 text-white p-4 shadow-lg">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold"><i class="fas fa-users-cog mr-2"></i>Admin Panel - Quản Lý Khách Hàng</h1>
            <a href="/" class="bg-white/20 hover:bg-white/30 px-3 py-1 rounded transition text-sm"><i class="fas fa-home"></i> Về Dashboard</a>
        </div>
    </nav>

    <div class="container mx-auto mt-6 p-4 max-w-6xl">
        <div class="bg-white rounded-xl shadow-md overflow-hidden">
            <table class="min-w-full leading-normal">
                <thead>
                    <tr>
                        <th class="px-5 py-3 border-b-2 border-gray-200 bg-gray-50 text-left text-xs font-semibold text-gray-600 uppercase">Tài khoản</th>
                        <th class="px-5 py-3 border-b-2 border-gray-200 bg-gray-50 text-left text-xs font-semibold text-gray-600 uppercase">Quyền</th>
                        <th class="px-5 py-3 border-b-2 border-gray-200 bg-gray-50 text-left text-xs font-semibold text-gray-600 uppercase">Số dư ví (Xu)</th>
                        <th class="px-5 py-3 border-b-2 border-gray-200 bg-gray-50 text-center text-xs font-semibold text-gray-600 uppercase">Thao tác</th>
                    </tr>
                </thead>
                <tbody id="user-list">
                    <tr><td colspan="4" class="px-5 py-4 text-center">Đang tải dữ liệu...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <div id="addXuModal" class="hidden fixed inset-0 bg-gray-600 bg-opacity-50 overflow-y-auto h-full w-full flex items-center justify-center">
        <div class="bg-white p-6 rounded-xl shadow-lg w-full max-w-sm">
            <h3 class="text-lg font-bold mb-4 border-b pb-2 text-gray-800">Cộng/Trừ Xu Khách Hàng</h3>
            <p class="text-sm text-gray-500 mb-4">Đang thao tác cho: <span id="target-username" class="font-bold text-indigo-600"></span></p>
            
            <input type="hidden" id="target-userid">
            
            <div>
                <label class="block text-sm font-semibold text-gray-600 mb-1">Số Xu (Ghi âm để trừ)</label>
                <input type="number" id="xu-amount" class="w-full px-3 py-2 border rounded focus:ring-2 focus:ring-indigo-500 outline-none" value="1000">
            </div>

            <div class="mt-6 flex justify-end gap-3">
                <button onclick="toggleModal('addXuModal')" class="px-4 py-2 bg-gray-200 rounded font-semibold">Hủy</button>
                <button onclick="submitAddXu()" class="px-4 py-2 bg-gray-900 text-white rounded font-semibold">Thực hiện</button>
            </div>
        </div>
    </div>

    <script>
        const admin_id = localStorage.getItem('user_id');
        const role = localStorage.getItem('role');

        if(role !== 'admin') {
            alert("Bạn không có quyền truy cập trang này!");
            window.location.href = "/";
        }

        function toggleModal(id) { document.getElementById(id).classList.toggle('hidden'); }

        function openAddXuModal(userId, username) {
            document.getElementById('target-userid').value = userId;
            document.getElementById('target-username').innerText = username;
            toggleModal('addXuModal');
        }

        async function loadUsers() {
            try {
                const res = await fetch(`/api/v1/admin/users?admin_id=${admin_id}`);
                const data = await res.json();
                
                if(data.success) {
                    document.getElementById('user-list').innerHTML = data.data.map(u => `
                        <tr class="hover:bg-gray-50">
                            <td class="px-5 py-4 border-b text-sm font-bold">${u.username}</td>
                            <td class="px-5 py-4 border-b text-sm"><span class="${u.role === 'admin' ? 'bg-red-100 text-red-800' : 'bg-blue-100 text-blue-800'} px-2 py-1 rounded text-xs font-bold uppercase">${u.role}</span></td>
                            <td class="px-5 py-4 border-b text-sm font-semibold text-green-600">${u.credits.toLocaleString()} Xu</td>
                            <td class="px-5 py-4 border-b text-sm text-center">
                                <button onclick="openAddXuModal('${u.user_id}', '${u.username}')" class="bg-gray-900 text-white px-3 py-1 rounded text-xs font-bold"><i class="fas fa-coins"></i> Nạp/Trừ Xu</button>
                            </td>
                        </tr>
                    `).join('');
                } else {
                    document.getElementById('user-list').innerHTML = `<tr><td colspan="4" class="text-center text-red-500">${data.message}</td></tr>`;
                }
            } catch (e) {
                console.error(e);
            }
        }

        async function submitAddXu() {
            const target_id = document.getElementById('target-userid').value;
            const amount = parseInt(document.getElementById('xu-amount').value);
            
            try {
                const res = await fetch('/api/v1/admin/add-xu', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ admin_id: admin_id, target_user_id: target_id, amount: amount })
                });
                const data = await res.json();
                alert(data.message);
                if(data.success) {
                    toggleModal('addXuModal');
                    loadUsers();
                }
            } catch (e) {
                alert("Lỗi kết nối!");
            }
        }

        document.addEventListener('DOMContentLoaded', loadUsers);
    </script>
</body>
</html>
