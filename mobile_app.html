<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TOAN AAS - Sale Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }
        /* Giả lập khung điện thoại khi xem trên máy tính */
        .mobile-container { max-width: 480px; margin: 0 auto; background: white; min-height: 100vh; position: relative; padding-bottom: 70px; box-shadow: 0 0 20px rgba(0,0,0,0.1); }
    </style>
</head>
<body class="bg-gray-100">

<div class="mobile-container overflow-hidden flex flex-col">
    
    <div class="bg-gradient-to-r from-blue-600 to-blue-800 text-white p-5 rounded-b-3xl shadow-md">
        <div class="flex justify-between items-center mb-4">
            <div class="flex items-center gap-3">
                <div class="h-10 w-10 bg-white rounded-full flex items-center justify-center text-blue-600 font-bold">NV</div>
                <div>
                    <h2 class="text-sm opacity-90">Xin chào,</h2>
                    <h1 class="font-bold text-lg" id="user-name">Nhân viên Sales</h1>
                </div>
            </div>
            <i class="fas fa-bell text-xl relative"><span class="absolute -top-1 -right-1 bg-red-500 h-3 w-3 rounded-full border-2 border-blue-800"></span></i>
        </div>
        
        <div class="bg-white/20 p-4 rounded-2xl backdrop-blur-sm flex justify-between items-center border border-white/30">
            <div>
                <p class="text-xs opacity-90 mb-1">KPI Tháng này</p>
                <p class="text-xl font-bold">120,000,000 ₫</p>
            </div>
            <div class="text-right">
                <p class="text-xs opacity-90 mb-1">Đạt được</p>
                <p class="text-xl font-bold text-green-300">85%</p>
            </div>
        </div>
    </div>

    <div class="p-5 flex-1 overflow-y-auto">
        <h3 class="font-bold text-gray-800 mb-3 text-sm">Tiện ích nhanh <i class="fas fa-bolt text-yellow-500"></i></h3>
        <div class="grid grid-cols-4 gap-4 mb-6">
            <div class="flex flex-col items-center gap-2" onclick="alert('Đã Check-in thành công!')">
                <div class="h-12 w-12 bg-blue-100 text-blue-600 rounded-2xl flex items-center justify-center text-xl shadow-sm active:scale-95 transition"><i class="fas fa-map-marker-alt"></i></div>
                <span class="text-[10px] font-semibold text-gray-600">Check-in</span>
            </div>
            <div class="flex flex-col items-center gap-2">
                <div class="h-12 w-12 bg-orange-100 text-orange-600 rounded-2xl flex items-center justify-center text-xl shadow-sm active:scale-95 transition"><i class="fas fa-user-plus"></i></div>
                <span class="text-[10px] font-semibold text-gray-600">Thêm Lead</span>
            </div>
            <div class="flex flex-col items-center gap-2">
                <div class="h-12 w-12 bg-green-100 text-green-600 rounded-2xl flex items-center justify-center text-xl shadow-sm active:scale-95 transition"><i class="fas fa-file-invoice-dollar"></i></div>
                <span class="text-[10px] font-semibold text-gray-600">Báo giá</span>
            </div>
            <div class="flex flex-col items-center gap-2">
                <div class="h-12 w-12 bg-purple-100 text-purple-600 rounded-2xl flex items-center justify-center text-xl shadow-sm active:scale-95 transition"><i class="fas fa-robot"></i></div>
                <span class="text-[10px] font-semibold text-gray-600">Hỏi AI</span>
            </div>
        </div>

        <div class="flex justify-between items-center mb-3">
            <h3 class="font-bold text-gray-800 text-sm">Khách hàng cần chăm sóc</h3>
            <a href="#" class="text-blue-600 text-xs font-semibold">Xem tất cả</a>
        </div>
        <div class="space-y-3" id="app-crm-list">
            <div class="text-center text-gray-500 text-sm py-4"><i class="fas fa-spinner fa-spin mr-2"></i>Đang đồng bộ dữ liệu...</div>
        </div>
    </div>

    <div class="absolute bottom-0 w-full bg-white border-t border-gray-200 flex justify-around p-3 pb-4 text-gray-400 text-xs font-semibold">
        <button class="flex flex-col items-center text-blue-600"><i class="fas fa-home text-lg mb-1"></i>Trang chủ</button>
        <button class="flex flex-col items-center hover:text-blue-600 transition"><i class="fas fa-address-book text-lg mb-1"></i>Khách hàng</button>
        <button class="flex flex-col items-center hover:text-blue-600 transition"><i class="fas fa-comments text-lg mb-1"></i>Chat</button>
        <button class="flex flex-col items-center hover:text-blue-600 transition"><i class="fas fa-user text-lg mb-1"></i>Cá nhân</button>
    </div>
</div>

<script>
    // Gọi thẳng vào API ERP Core sếp đã làm ở bước trước
    async function loadMobileCRM() {
        try {
            const res = await fetch('/api/v1/erp/customers');
            const data = await res.json();
            const list = document.getElementById('app-crm-list');
            if(data.success && data.data.length > 0) {
                // Chỉ lấy 3 khách hàng mới nhất cho App
                list.innerHTML = data.data.slice(0, 3).map(c => `
                    <div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100 flex justify-between items-center">
                        <div class="flex items-center gap-3">
                            <div class="h-10 w-10 bg-gray-100 rounded-full flex items-center justify-center text-gray-500 font-bold"><i class="fas fa-building"></i></div>
                            <div>
                                <h4 class="font-bold text-sm text-gray-800">${c.name}</h4>
                                <p class="text-[11px] text-gray-500">${c.phone}</p>
                            </div>
                        </div>
                        <button class="h-8 w-8 bg-green-100 text-green-600 rounded-full flex items-center justify-center"><i class="fas fa-phone-alt"></i></button>
                    </div>
                `).join('');
            }
        } catch (e) { console.error(e); }
    }
    document.addEventListener('DOMContentLoaded', loadMobileCRM);
</script>
</body>
</html>
