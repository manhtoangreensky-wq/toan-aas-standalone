<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AAS - Employee App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; }</style>
</head>
<body class="flex flex-col h-screen overflow-hidden text-slate-800">

    <header class="bg-blue-600 text-white p-4 pt-6 shadow-md z-10 rounded-b-2xl">
        <div class="flex justify-between items-center mb-4">
            <div>
                <p class="text-blue-200 text-xs font-semibold uppercase tracking-wider">AAS WORKSPACE</p>
                <h1 class="text-xl font-bold" id="emp-name">Đang tải...</h1>
            </div>
            <div class="h-10 w-10 rounded-full bg-white/20 flex items-center justify-center border border-white/30" onclick="logout()"><i class="fas fa-sign-out-alt"></i></div>
        </div>
    </header>

    <main class="flex-1 overflow-y-auto p-4 pb-24 space-y-6">
        
        <div class="bg-white rounded-2xl p-5 shadow-sm border border-slate-100 text-center">
            <h2 class="text-sm font-bold text-slate-500 mb-2">CHẤM CÔNG HÔM NAY</h2>
            <h1 class="text-4xl font-black text-slate-800 mb-4" id="clock">00:00</h1>
            <button onclick="checkIn()" class="w-full bg-gradient-to-r from-blue-500 to-indigo-600 text-white font-bold py-3.5 rounded-xl shadow-lg shadow-blue-500/30 active:scale-95 transition">
                <i class="fas fa-fingerprint text-xl mr-2"></i> Chấm Công Ngay
            </button>
            <p id="checkin-status" class="text-xs text-emerald-600 font-bold mt-3 hidden"><i class="fas fa-check-circle mr-1"></i>Đã ghi nhận có mặt!</p>
        </div>

        <div>
            <h3 class="font-bold text-slate-800 mb-3"><i class="fas fa-tasks text-blue-500 mr-2"></i>Nhiệm vụ được giao</h3>
            <div id="tasks-list" class="space-y-3">
                <div class="text-center text-slate-400 text-sm py-4"><i class="fas fa-spinner fa-spin mr-2"></i>Đang tải nhiệm vụ...</div>
            </div>
        </div>

        <div class="bg-white rounded-2xl p-5 shadow-sm border border-slate-100">
            <h3 class="font-bold text-slate-800 mb-3"><i class="fas fa-file-signature text-emerald-500 mr-2"></i>Trình ký Yêu cầu</h3>
            <input type="text" id="req-title" placeholder="Lý do (VD: Nghỉ ốm 1 ngày)" class="w-full bg-slate-50 border border-slate-200 rounded-lg p-3 text-sm mb-3 outline-none">
            <select id="req-type" class="w-full bg-slate-50 border border-slate-200 rounded-lg p-3 text-sm mb-4 outline-none">
                <option value="Nghỉ phép">Nghỉ phép</option>
                <option value="Tạm ứng">Tạm ứng công tác</option>
            </select>
            <button onclick="submitRequest()" class="w-full bg-emerald-100 text-emerald-700 hover:bg-emerald-200 font-bold py-3 rounded-lg transition">Gửi Trình Ký Sếp</button>
        </div>

        <div>
            <h3 class="font-bold text-slate-800 mb-3"><i class="fas fa-newspaper text-rose-500 mr-2"></i>Bảng tin Nội bộ</h3>
            <div id="social-list" class="space-y-3"></div>
        </div>
    </main>

    <nav class="bg-white border-t border-slate-200 fixed bottom-0 w-full flex justify-around pb-6 pt-3 px-2 z-20">
        <button class="flex flex-col items-center text-blue-600"><i class="fas fa-home text-xl mb-1"></i><span class="text-[10px] font-bold">Home</span></button>
        <button onclick="window.location.href='/assistant-app'" class="flex flex-col items-center text-slate-400 hover:text-blue-600"><i class="fas fa-robot text-xl mb-1"></i><span class="text-[10px] font-bold">AI Chat</span></button>
        <button onclick="window.location.href='/login'" class="flex flex-col items-center text-slate-400 hover:text-rose-600"><i class="fas fa-sign-out-alt text-xl mb-1"></i><span class="text-[10px] font-bold">Thoát</span></button>
    </nav>

    <script>
        const USERNAME = localStorage.getItem('username');
        if(!USERNAME) window.location.href = '/login';
        document.getElementById('emp-name').innerText = USERNAME;

        // Đồng hồ realtime
        setInterval(() => {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString('vi-VN', {hour: '2-digit', minute:'2-digit'});
        }, 1000);

        function logout() { localStorage.clear(); window.location.href = '/login'; }

        async function checkIn() {
            try {
                await fetch('/api/v1/erp/attendance', {
                    method: 'POST', headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ emp_name: USERNAME, status: "Đúng giờ" })
                });
                document.getElementById('checkin-status').classList.remove('hidden');
            } catch(e) { alert("Lỗi mạng!"); }
        }

        async function submitRequest() {
            const title = document.getElementById('req-title').value;
            const type = document.getElementById('req-type').value;
            if(!title) return alert("Vui lòng nhập lý do!");
            try {
                await fetch('/api/v1/erp/approvals', {
                    method: 'POST', headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ title: title, req_type: type, requested_by: USERNAME, status: "Chờ Sếp duyệt" })
                });
                alert("Đã gửi yêu cầu thành công!");
                document.getElementById('req-title').value = '';
            } catch(e) {}
        }

        async function loadData() {
            try {
                // Tải Tasks
                const rTask = await fetch('/api/v1/erp/workloads');
                const dTask = await rTask.json();
                if(dTask.success) {
                    const myTasks = dTask.data.filter(t => t.emp_name.includes(USERNAME));
                    const box = document.getElementById('tasks-list');
                    if(myTasks.length > 0) {
                        box.innerHTML = myTasks.map(t => `<div class="bg-white p-4 rounded-xl shadow-sm border-l-4 border-blue-500"><h4 class="font-bold text-slate-800">${t.task_name}</h4><div class="flex justify-between mt-2 text-xs font-semibold text-slate-500"><span>${t.est_hours} Giờ</span><span class="text-orange-500">${t.status}</span></div></div>`).join('');
                    } else box.innerHTML = '<div class="text-center text-slate-400 text-sm py-2">Bạn đã hoàn thành mọi nhiệm vụ!</div>';
                }

                // Tải Bảng tin
                const rSoc = await fetch('/api/v1/erp/social');
                const dSoc = await rSoc.json();
                if(dSoc.success) {
                    document.getElementById('social-list').innerHTML = dSoc.data.slice(0,3).map(s => `<div class="bg-white p-4 rounded-xl shadow-sm"><p class="font-bold text-sm">${s.author}</p><p class="text-sm text-slate-600 mt-1">${s.content}</p></div>`).join('');
                }
            } catch(e) {}
        }
        document.addEventListener('DOMContentLoaded', loadData);
    </script>
</body>
</html>
