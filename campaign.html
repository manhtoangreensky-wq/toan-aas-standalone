<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOAN AAS - Affiliate Campaign</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gray-100 text-gray-800 font-sans min-h-screen">
    
    <nav class="bg-purple-700 text-white p-4 shadow-lg">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold"><i class="fas fa-rocket mr-2"></i>B2C Affiliate Vault</h1>
            <a href="/" class="bg-white/20 hover:bg-white/30 px-3 py-1 rounded transition text-sm"><i class="fas fa-home"></i> Về Dashboard</a>
        </div>
    </nav>

    <div class="container mx-auto mt-6 p-4 max-w-6xl flex flex-col lg:flex-row gap-6">
        
        <div class="w-full lg:w-1/3 bg-white p-6 rounded-xl shadow-md h-fit border-t-4 border-purple-500">
            <h2 class="text-lg font-bold mb-4 text-gray-700">Tạo Chiến Dịch Mới</h2>
            
            <div class="mb-3">
                <label class="block text-sm font-semibold text-gray-600 mb-1">Tên Sản Phẩm / Tên Chiến dịch</label>
                <input type="text" id="campaign_name" class="w-full px-3 py-2 border rounded focus:ring-2 focus:ring-purple-500 outline-none" placeholder="VD: Bán Sạc Dự Phòng Baseus">
            </div>

            <div class="mb-3">
                <label class="block text-sm font-semibold text-gray-600 mb-1">Link Affiliate (Shopee/TikTok)</label>
                <input type="url" id="product_link" class="w-full px-3 py-2 border rounded focus:ring-2 focus:ring-purple-500 outline-none" placeholder="https://shope.ee/...">
            </div>

            <div class="mb-5">
                <label class="block text-sm font-semibold text-gray-600 mb-1">Nền tảng đăng bài</label>
                <select id="platform" class="w-full px-3 py-2 border rounded focus:ring-2 focus:ring-purple-500 outline-none">
                    <option value="TikTok">TikTok</option>
                    <option value="Facebook">Facebook Reels</option>
                    <option value="YouTube">YouTube Shorts</option>
                </select>
            </div>

            <button onclick="createCampaign()" class="w-full bg-purple-600 hover:bg-purple-700 text-white font-bold py-2 px-4 rounded shadow transition">
                <i class="fas fa-save"></i> Lưu Chiến Dịch
            </button>
        </div>

        <div class="w-full lg:w-2/3 bg-white p-6 rounded-xl shadow-md border-t-4 border-gray-700">
            <h2 class="text-lg font-bold mb-4 text-gray-700 flex justify-between items-center">
                <span>Kho Link Sản Phẩm Của Sếp</span>
                <button onclick="loadCampaigns()" class="text-sm text-blue-600 hover:text-blue-800"><i class="fas fa-sync-alt"></i> Làm mới</button>
            </h2>
            
            <div class="overflow-x-auto">
                <table class="min-w-full bg-white border">
                    <thead class="bg-gray-100 text-gray-600 text-sm">
                        <tr>
                            <th class="py-2 px-4 border-b text-left">Ngày tạo</th>
                            <th class="py-2 px-4 border-b text-left">Tên Chiến Dịch</th>
                            <th class="py-2 px-4 border-b text-center">Nền tảng</th>
                            <th class="py-2 px-4 border-b text-center">Link</th>
                        </tr>
                    </thead>
                    <tbody id="campaign-list" class="text-sm text-gray-700">
                        <tr><td colspan="4" class="text-center py-4">Đang tải dữ liệu...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

    </div>

    <script>
        const USER_ID = localStorage.getItem('user_id');
        if(!USER_ID) { window.location.href = '/login'; }

        async function loadCampaigns() {
            try {
                const res = await fetch(`/api/v1/campaign/${USER_ID}`);
                const data = await res.json();
                const tbody = document.getElementById('campaign-list');
                
                if (data.success && data.data.length > 0) {
                    tbody.innerHTML = data.data.map(c => `
                        <tr class="hover:bg-gray-50 transition">
                            <td class="py-3 px-4 border-b text-xs text-gray-500">${c.date.split(' ')[0]}</td>
                            <td class="py-3 px-4 border-b font-semibold">${c.name}</td>
                            <td class="py-3 px-4 border-b text-center">
                                <span class="bg-purple-100 text-purple-700 font-bold px-2 py-1 rounded text-xs">${c.platform}</span>
                            </td>
                            <td class="py-3 px-4 border-b text-center">
                                <a href="${c.link}" target="_blank" class="text-blue-500 hover:text-blue-700" title="Mở link">
                                    <i class="fas fa-external-link-alt"></i>
                                </a>
                            </td>
                        </tr>
                    `).join('');
                } else {
                    tbody.innerHTML = `<tr><td colspan="4" class="text-center py-6 text-gray-500">Chưa có chiến dịch nào. Thêm link sản phẩm ngay!</td></tr>`;
                }
            } catch (error) {
                console.error("Lỗi:", error);
            }
        }

        async function createCampaign() {
            const name = document.getElementById('campaign_name').value;
            const link = document.getElementById('product_link').value;
            const platform = document.getElementById('platform').value;

            if (!name || !link) return alert("Sếp nhập đủ tên và link nhé!");

            try {
                const res = await fetch('/api/v1/campaign/create', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        user_id: USER_ID,
                        campaign_name: name,
                        product_link: link,
                        platform: platform
                    })
                });
                const data = await res.json();
                if (data.success) {
                    alert("Đã lưu chiến dịch vào kho!");
                    document.getElementById('campaign_name').value = "";
                    document.getElementById('product_link').value = "";
                    loadCampaigns(); // Tải lại danh sách
                }
            } catch (error) {
                alert("Đã xảy ra lỗi khi tạo chiến dịch.");
            }
        }

        document.addEventListener('DOMContentLoaded', loadCampaigns);
    </script>
</body>
</html>
