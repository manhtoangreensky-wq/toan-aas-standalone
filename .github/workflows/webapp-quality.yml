name: Web App quality gate

on:
  push:
    branches:
      - main
  # Every feature change is checked through its pull request.  Keeping the
  # push trigger to main preserves a post-merge source check, while avoiding
  # a duplicate full-suite run (and duplicate failure notification) for each
  # feature branch push that also opens a PR.
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: webapp-quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify Web App
    runs-on: ubuntu-latest
    # PRs use a deliberately small, security-focused smoke suite. The full
    # repository suite is a release verification, not a per-commit action:
    # running every integration contract here has previously left runners
    # stuck and blocked otherwise valid, independently reviewable PRs.
    # Keep setup allowance for a cold runner; the test process itself is
    # independently capped below, which is the anti-stall control.
    timeout-minutes: 20

    steps:
      - name: Check out source
        uses: actions/checkout@v4
        with:
          # The whitespace gate compares the pushed commit with its parent.
          # checkout defaults to a depth of one, where HEAD^ is unavailable.
          fetch-depth: 2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install test dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements-dev.txt

      - name: Compile Python
        run: python -m compileall -q .

      - name: Check portal JavaScript syntax
        run: |
          node --check static/portal/portal.js
          node --check static/portal/integration.js
          node --check static/portal/service-worker.js

      - name: Run critical Web App contracts (bounded)
        shell: bash
        run: |
          # `timeout` makes a stalled local TestClient/thread test fail
          # visibly instead of keeping a PR in "pending" indefinitely.
          timeout --signal=TERM --kill-after=30s 12m python -m pytest -q --maxfail=1 \
            tests/test_copyfast_auth_api.py::test_signed_session_csrf_and_telegram_link \
            tests/test_copyfast_auth_api.py::test_workspace_menu_is_signed_and_cache_private \
            tests/test_copyfast_auth_api.py::test_web_owned_profile_defaults_are_csrf_protected_and_cannot_change_canonical_authority \
            tests/test_copyfast_auth_api.py::test_telegram_link_callback_requires_hmac_timestamp_and_one_time_nonce \
            tests/test_copyfast_auth_api.py::test_upload_rejects_path_traversal_and_never_falls_back_to_web_storage \
            tests/test_copyfast_auth_api.py::test_legacy_billing_router_is_not_mounted_as_a_second_payos_or_wallet_writer \
            tests/test_copyfast_auth_api.py::test_admin_portal_requires_signed_session_and_current_canonical_role \
            tests/test_account_security_center.py::test_security_sessions_are_owner_scoped_redacted_and_csrf_protected \
            tests/test_account_security_center.py::test_password_change_requires_csrf_rotates_all_sessions_and_never_returns_raw_id \
            tests/test_account_security_center.py::test_telegram_account_upgrade_rechecks_a_revoked_actor_before_adding_password \
            tests/test_portal_i18n_bundle_contracts.py \
            tests/test_portal_i18n_locale_contracts.py \
            tests/test_interface_locale_navigator_portal_contracts.py \
            tests/test_workspace_menu_portal_contracts.py \
            tests/test_portal_navigation_ux_contracts.py \
            tests/test_copyfast_music_directions.py \
            tests/test_music_directions_portal_contracts.py \
            tests/test_copyfast_sfx_cue_sheet.py \
            tests/test_sfx_cue_sheet_portal_contracts.py \
            tests/test_migration_audit.py::test_static_audit_never_imports_source_and_redacts_secret_literals \
            tests/test_migration_audit.py::test_static_audit_uses_only_the_finite_reviewed_menu_navigation_catalog \
            tests/test_migration_audit.py::test_static_audit_keeps_billing_menu_private_canonical_admin_navigation_only \
            tests/test_migration_audit.py::test_static_audit_keeps_interface_locale_navigation_closed_to_reviewed_web_catalogs

      - name: Check diff whitespace
        run: git diff --check HEAD^ HEAD
