name: Web App quality gate

on:
  push:
    branches:
      - main
  # Every feature change is checked through its pull request.  Keeping the
  # push trigger to main preserves a post-merge source check, while avoiding
  # a duplicate full-suite run (and duplicate failure notification) for each
  # feature branch push that also opens a PR.
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: webapp-quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify Web App
    runs-on: ubuntu-latest
    # The full suite legitimately exceeds ten minutes on a cold hosted runner.
    # A bounded allowance keeps the quality gate authoritative instead of
    # cancelling a healthy verification midway through.
    timeout-minutes: 30

    steps:
      - name: Check out source
        uses: actions/checkout@v4
        with:
          # The whitespace gate compares the pushed commit with its parent.
          # checkout defaults to a depth of one, where HEAD^ is unavailable.
          fetch-depth: 2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install test dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements-dev.txt

      - name: Compile Python
        run: python -m compileall -q .

      - name: Check portal JavaScript syntax
        run: |
          node --check static/portal/portal.js
          node --check static/portal/integration.js
          node --check static/portal/service-worker.js

      - name: Run Web App tests
        run: python -m pytest -q

      - name: Check diff whitespace
        run: git diff --check HEAD^ HEAD
