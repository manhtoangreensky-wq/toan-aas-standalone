<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOAN AAS - Trạm Xử Lý Media AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gray-100 text-gray-800 font-sans min-h-screen">
    
    <nav class="bg-orange-600 text-white p-4 shadow-lg">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold"><i class="fas fa-photo-video mr-2"></i>AI Media Studio</h1>
            <a href="/" class="bg-white/20 hover:bg-white/30 px-3 py-1 rounded transition text-sm"><i class="fas fa-home"></i> Về Dashboard</a>
        </div>
    </nav>

    <div class="container mx-auto mt-6 p-4 max-w-6xl grid grid-cols-1 md:grid-cols-3 gap-6">
        
        <div class="bg-white p-6 rounded-xl shadow-md border-t-4 border-blue-500 flex flex-col">
            <h2 class="text-lg font-bold mb-4 text-blue-700"><i class="fas fa-microphone-alt"></i> Lồng Tiếng AI (TTS)</h2>
            <textarea id="tts-text" rows="3" class="w-full px-3 py-2 border rounded mb-3 outline-none focus:ring-2 focus:ring-blue-500" placeholder="Nhập văn bản cần đọc..."></textarea>
            <button onclick="runTTS()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded shadow transition mt-auto">
                Tạo Giọng Đọc
            </button>
            <div id="tts-result" class="mt-3 text-sm text-gray-600 p-2 bg-gray-50 rounded min-h-[40px]"></div>
        </div>

        <div class="bg-white p-6 rounded-xl shadow-md border-t-4 border-green-500 flex flex-col">
            <h2 class="text-lg font-bold mb-4 text-green-700"><i class="fas fa-file-audio"></i> Bóc Băng (STT)</h2>
            <input type="url" id="stt-url" class="w-full px-3 py-2 border rounded mb-3 outline-none focus:ring-2 focus:ring-green-500" placeholder="Nhập Link file âm thanh (.mp3)">
            <button onclick="runSTT()" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-2 px-4 rounded shadow transition mt-auto">
                Chuyển Thành Chữ
            </button>
            <div id="stt-result" class="mt-3 text-sm text-gray-600 p-2 bg-gray-50 rounded min-h-[40px]"></div>
        </div>

        <div class="bg-white p-6 rounded-xl shadow-md border-t-4 border-purple-500 flex flex-col">
            <h2 class="text-lg font-bold mb-4 text-purple-700"><i class="fas fa-crop-alt"></i> Tách Nền Ảnh</h2>
            <input type="url" id="bg-url" class="w-full px-3 py-2 border rounded mb-3 outline-none focus:ring-2 focus:ring-purple-500" placeholder="Nhập Link ảnh cần tách nền">
            <button onclick="runRemoveBG()" class="w-full bg-purple-600 hover:bg-purple-700 text-white font-bold py-2 px-4 rounded shadow transition mt-auto">
                Xóa Phông Nền
            </button>
            <div id="bg-result" class="mt-3 text-sm text-gray-600 p-2 bg-gray-50 rounded min-h-[40px]"></div>
        </div>

    </div>

    <script>
        async function runTTS() {
            const text = document.getElementById('tts-text').value;
            const resBox = document.getElementById('tts-result');
            if(!text) return alert("Vui lòng nhập văn bản!");
            resBox.innerHTML = "Đang xử lý...";
            try {
                const res = await fetch('/api/v1/media/tts', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: text })
                });
                const data = await res.json();
                resBox.innerHTML = `<span class="text-green-600 font-bold">Thành công!</span><br>Link Audio: <a href="${data.mock_audio_url}" class="text-blue-500" target="_blank">${data.mock_audio_url}</a>`;
            } catch (e) { resBox.innerHTML = "<span class='text-red-500'>Lỗi kết nối</span>"; }
        }

        async function runSTT() {
            const url = document.getElementById('stt-url').value;
            const resBox = document.getElementById('stt-result');
            if(!url) return alert("Vui lòng nhập link âm thanh!");
            resBox.innerHTML = "Đang nghe và bóc băng...";
            try {
                const res = await fetch('/api/v1/media/stt', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ audio_url: url })
                });
                const data = await res.json();
                resBox.innerHTML = `<span class="text-green-600 font-bold">Kết quả:</span><br><i>"${data.mock_transcript}"</i>`;
            } catch (e) { resBox.innerHTML = "<span class='text-red-500'>Lỗi kết nối</span>"; }
        }

        async function runRemoveBG() {
            const url = document.getElementById('bg-url').value;
            const resBox = document.getElementById('bg-result');
            if(!url) return alert("Vui lòng nhập link ảnh!");
            resBox.innerHTML = "Đang tách nền...";
            try {
                const res = await fetch('/api/v1/media/remove-bg', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ image_url: url })
                });
                const data = await res.json();
                resBox.innerHTML = `<span class="text-green-600 font-bold">Xong!</span><br>Link Ảnh: <a href="${data.mock_processed_image}" class="text-blue-500" target="_blank">${data.mock_processed_image}</a>`;
            } catch (e) { resBox.innerHTML = "<span class='text-red-500'>Lỗi kết nối</span>"; }
        }
    </script>
</body>
</html>
