
<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Toàn AAS Web</title>
  <style>
    body { background:#0b1220; color:#e2e8f0; font-family: Inter, Arial, sans-serif; margin:0; padding:40px; }
    .container { max-width:800px; margin:0 auto; }
    h1 { color:#38bdf8; font-size:32px; display:flex; align-items:center; gap:10px; }
    textarea { width:100%; height:120px; background:#1e293b; border:1px solid #334155; color:#fff; padding:15px; border-radius:12px; font-size:16px; resize:vertical; }
    button { background:#0ea5e9; color:white; border:none; padding:12px 24px; border-radius:10px; font-size:16px; cursor:pointer; margin-top:12px; font-weight:600; }
    button:hover { background:#0284c7; }
    .result { background:#1e293b; padding:20px; border-radius:12px; margin-top:20px; white-space:pre-wrap; min-height:60px; }
    .prompts { margin-top:30px; }
    .prompt-chip { display:inline-block; background:#334155; padding:8px 14px; margin:6px; border-radius:20px; cursor:pointer; font-size:14px; }
    .prompt-chip:hover { background:#475569; }
    .logo { text-align:center; margin-bottom:20px; }
    .logo img { max-width:150px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">
      <img src="/static/logo_chính_thức.png" onerror="this.style.display='none'">
    </div>
    <h1>🚀 Toàn AAS Web</h1>
    <p>App riêng, không phụ thuộc bot Telegram.</p>

    <textarea id="prompt" placeholder="Nhập prompt cần tạo..."></textarea>
    <button onclick="generate()">Tạo ngay</button>

    <div id="result" class="result" style="display:none;"></div>

    <div class="prompts">
      <h2>Gợi ý prompt</h2>
      <div id="chips">
        {% for p in prompts %}
        <span class="prompt-chip" onclick="usePrompt(`{{ p|e }}`)">{{ p }}</span>
        {% endfor %}
      </div>
    </div>
  </div>

<script>
function usePrompt(text) {
  document.getElementById('prompt').value = text;
}
async function generate() {
  const prompt = document.getElementById('prompt').value.trim();
  if(!prompt) return alert('Nhập prompt đã!');
  const btn = event.target;
  btn.disabled = true; btn.innerText = 'Đang tạo...';
  const resultDiv = document.getElementById('result');
  resultDiv.style.display = 'block';
  resultDiv.innerText = 'Đang xử lý...';

  const form = new FormData();
  form.append('prompt', prompt);

  try {
    const res = await fetch('/generate', { method:'POST', body:form });
    const data = await res.json();
    resultDiv.innerText = data.result;
  } catch(e) {
    resultDiv.innerText = 'Lỗi: ' + e;
  }
  btn.disabled = false; btn.innerText = 'Tạo ngay';
}
</script>
</body>
</html>
