
<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Toàn AAS Pro</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
:root{--bg:#050810;--card:#0f172a;--muted:#1e293b;--accent:#0ea5e9;--text:#e2e8f0;--sub:#94a3b8}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:Inter,sans-serif}
.wrap{display:grid;grid-template-columns:1fr 360px;min-height:100vh}
.main{padding:32px;max-width:900px}
.side{background:var(--card);border-left:1px solid #1e293b;padding:24px;overflow:auto}
.header{display:flex;align-items:center;gap:14px;margin-bottom:24px}
.logo{width:48px;height:48px;border-radius:12px;background:#fff;display:flex;align-items:center;justify-content:center;overflow:hidden}
.logo img{width:100%}
h1{font-size:24px;margin:0;font-weight:700} .badge{background:var(--muted);padding:4px 10px;border-radius:20px;font-size:12px;color:var(--sub)}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin:20px 0}
.stat{background:var(--card);border:1px solid #1e293b;padding:16px;border-radius:14px}
.stat .label{color:var(--sub);font-size:12px} .stat .value{font-size:22px;font-weight:600;margin-top:4px;color:var(--accent)}
.input-wrap{background:var(--card);border:1px solid #233044;border-radius:16px;padding:18px}
textarea{width:100%;height:110px;background:transparent;border:none;color:var(--text);font-size:15px;resize:vertical;outline:none}
.actions{display:flex;gap:10px;margin-top:12px}
.btn{background:var(--accent);color:#001018;border:none;padding:10px 18px;border-radius:10px;font-weight:600;cursor:pointer}
.btn:disabled{opacity:.6}
.chips{margin-top:14px;display:flex;flex-wrap:wrap;gap:8px}
.chip{background:var(--muted);padding:6px 12px;border-radius:20px;font-size:13px;cursor:pointer;border:1px solid transparent}
.chip:hover{border-color:var(--accent)}
.result{margin-top:20px;background:var(--card);border:1px solid #1e293b;border-radius:16px;padding:20px;white-space:pre-wrap;min-height:80px}
.result-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;color:var(--sub);font-size:13px}
.copy{cursor:pointer;color:var(--accent)}
.side h3{margin:0 0 12px;font-size:14px;text-transform:uppercase;letter-spacing:.5px;color:var(--sub)}
.hist-item{background:var(--muted);padding:10px;border-radius:10px;margin-bottom:8px;font-size:13px;cursor:pointer}
.hist-item:hover{background:#2a3a52}
canvas{margin-top:16px}
@media(max-width:1000px){.wrap{grid-template-columns:1fr}.side{display:none}}
</style>
</head>
<body>
<div class="wrap">
  <div class="main">
    <div class="header">
      <div class="logo"><img src="/static/logo_chính_thức.png" onerror="this.parentNode.innerText='TA'"></div>
      <div>
        <h1>Toàn AAS Pro</h1>
        <div class="badge">{{ keys_count }} API key • Minimal + Dashboard</div>
      </div>
    </div>

    <div class="stats">
      <div class="stat"><div class="label">Tổng lệnh</div><div class="value" id="stat-total">{{ total }}</div></div>
      <div class="stat"><div class="label">TB/ngày</div><div class="value" id="stat-avg">{{ avg_per_day }}</div></div>
      <div class="stat"><div class="label">Trạng thái</div><div class="value" style="color:#22c55e">Live</div></div>
    </div>

    <div class="input-wrap">
      <textarea id="prompt" placeholder="Nhập yêu cầu content... (VD: Viết bài bán serum mụn)"></textarea>
      <div class="actions">
        <button class="btn" id="genBtn" onclick="generate()">Tạo ngay →</button>
      </div>
      <div class="chips">
        {% for p in prompts[:8] %}<div class="chip" onclick="usePrompt(`{{ p|e }}`)">{{ p[:30] }}...</div>{% endfor %}
      </div>
    </div>

    <div id="resultBox" class="result" style="display:none">
      <div class="result-head"><span id="modelTag"></span><span class="copy" onclick="copyRes()">Copy</span></div>
      <div id="resultText"></div>
    </div>
  </div>

  <div class="side">
    <h3>Lịch sử</h3>
    <div id="history"></div>
    <h3 style="margin-top:24px">7 ngày qua</h3>
    <canvas id="chart" height="160"></canvas>
  </div>
</div>

<script>
function usePrompt(t){document.getElementById('prompt').value=t}
async function generate(){
  const p=document.getElementById('prompt').value.trim(); if(!p)return;
  const btn=document.getElementById('genBtn'); btn.disabled=true; btn.innerText='Đang tạo...';
  const box=document.getElementById('resultBox'); box.style.display='block';
  document.getElementById('resultText').innerText='...';
  const fd=new FormData(); fd.append('prompt',p);
  const res=await fetch('/generate',{method:'POST',body:fd}); const data=await res.json();
  document.getElementById('modelTag').innerText=data.model.toUpperCase();
  document.getElementById('resultText').innerText=data.result;
  btn.disabled=false; btn.innerText='Tạo ngay →'; loadHistory(); loadStats();
}
function copyRes(){navigator.clipboard.writeText(document.getElementById('resultText').innerText)}
async function loadHistory(){
  const res=await fetch('/history'); const data=await res.json();
  document.getElementById('history').innerHTML=data.slice(0,15).map(h=>`<div class="hist-item" onclick="usePrompt(\`${h.prompt.replace(/`/g,'')}\`)">${h.prompt.slice(0,40)}...</div>`).join('');
  document.getElementById('stat-total').innerText=data.length;
}
async function loadStats(){
  const res=await fetch('/stats'); const s=await res.json();
  const ctx=document.getElementById('chart'); new Chart(ctx,{type:'line',data:{labels:s.by_day.map(d=>d.date.slice(5)),datasets:[{data:s.by_day.map(d=>d.count),borderColor:'#0ea5e9',tension:.3}]},options:{plugins:{legend:{display:false}},scales:{y:{beginAtZero:true,grid:{color:'#1e293b'}},x:{grid:{display:false}}}}});
}
loadHistory(); loadStats();
</script>
</body>
</html>
