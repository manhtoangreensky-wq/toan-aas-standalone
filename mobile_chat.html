<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TOAN AAS - Trợ Lý AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: white; margin: 0; overflow: hidden; }
        .app-container { max-width: 480px; margin: 0 auto; background-color: #0f172a; height: 100vh; display: flex; flex-direction: column; position: relative; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .glass-header { background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(255,255,255,0.05); }
    </style>
</head>
<body>

<div class="app-container">
    
    <div class="glass-header p-4 flex justify-between items-center z-20 absolute top-0 w-full">
        <a href="/" class="text-slate-300 hover:text-white transition p-2"><i class="fas fa-chevron-left text-xl"></i></a>
        <div class="text-center">
            <h1 class="font-bold text-sm text-white flex items-center justify-center gap-2">
                <i class="fas fa-robot text-blue-400"></i> Trợ Lý TOAN AAS
            </h1>
            <p class="text-[10px] text-emerald-400 flex items-center justify-center gap-1"><i class="fas fa-circle text-[6px]"></i> Đang trực tuyến (2 Xu/Lần)</p>
        </div>
        <div class="flex flex-col items-end">
            <p class="text-[10px] text-slate-400">Ví Xu</p>
            <p class="text-xs font-bold text-blue-400" id="wallet-balance">...</p>
        </div>
    </div>

    <div class="flex-1 overflow-y-auto no-scrollbar p-4 pt-20 pb-24 flex flex-col gap-4" id="chat-box">
        
        <div class="flex gap-3 max-w-[85%]">
            <div class="h-8 w-8 rounded-full bg-blue-600 flex items-center justify-center text-white flex-shrink-0 shadow-lg">
                <i class="fas fa-robot text-xs"></i>
            </div>
            <div class="bg-slate-800 p-3 rounded-2xl rounded-tl-sm text-sm text-slate-200 border border-slate-700 shadow-md">
                Xin chào Sếp! Tôi là trợ lý AI thông minh của TOAN AAS. Sếp muốn dịch thuật, viết kịch bản, hay tra cứu thông tin gì hôm nay?
            </div>
        </div>

    </div>

    <div class="absolute bottom-0 w-full bg-[#1e293b] border-t border-slate-700 p-3 flex items-end gap-2 pb-safe z-20">
        <button class="h-10 w-10 flex-shrink-0 text-slate-400 hover:text-blue-400 transition"><i class="fas fa-paperclip text-lg"></i></button>
        <div class="flex-1 bg-slate-800 rounded-2xl border border-slate-700 flex items-center overflow-hidden">
            <textarea id="chat-input" rows="1" class="w-full bg-transparent text-white text-sm px-4 py-3 outline-none resize-none no-scrollbar max-h-24" placeholder="Hỏi tôi bất cứ điều gì..."></textarea>
        </div>
        <button id="btn-send" onclick="sendMessage()" class="h-11 w-11 flex-shrink-0 bg-blue-600 rounded-full flex items-center justify-center text-white shadow-lg shadow-blue-600/30 hover:bg-blue-500 transition active:scale-95">
            <i class="fas fa-paper-plane text-sm"></i>
        </button>
    </div>

</div>

<script>
    const USER_ID = localStorage.getItem('user_id');
    if(!USER_ID) { window.location.href = '/login'; }

    // Tải số dư Xu
    async function loadBalance() {
        try {
            const res = await fetch(`/api/v1/auth/me/${USER_ID}`);
            const data = await res.json();
            if(data.success) {
                document.getElementById('wallet-balance').innerText = data.credits.toLocaleString('vi-VN');
            }
        } catch(e) {}
    }

    // Tự động kéo cuộn xuống cuối
    function scrollToBottom() {
        const chatBox = document.getElementById('chat-box');
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    // Gửi tin nhắn
    async function sendMessage() {
        const input = document.getElementById('chat-input');
        const text = input.value.trim();
        if(!text) return;

        const chatBox = document.getElementById('chat-box');
        const btnSend = document.getElementById('btn-send');

        // 1. In tin nhắn của User ra màn hình
        chatBox.innerHTML += `
            <div class="flex gap-3 max-w-[85%] self-end ml-auto">
                <div class="bg-blue-600 p-3 rounded-2xl rounded-tr-sm text-sm text-white shadow-md">${text.replace(/\\n/g, '<br>')}</div>
            </div>
        `;
        input.value = '';
        input.style.height = 'auto'; // Reset chiều cao textarea
        scrollToBottom();

        // 2. Hiện trạng thái AI đang gõ
        const typingId = 'typing-' + Date.now();
        chatBox.innerHTML += `
            <div id="${typingId}" class="flex gap-3 max-w-[85%]">
                <div class="h-8 w-8 rounded-full bg-slate-700 flex items-center justify-center text-slate-400 flex-shrink-0"><i class="fas fa-robot text-xs"></i></div>
                <div class="bg-slate-800 p-3 rounded-2xl rounded-tl-sm text-sm text-slate-400 border border-slate-700 flex gap-1 items-center">
                    <span class="animate-bounce">•</span><span class="animate-bounce delay-75">•</span><span class="animate-bounce delay-150">•</span>
                </div>
            </div>
        `;
        scrollToBottom();

        btnSend.disabled = true;

        try {
            // 3. Gọi API
            const res = await fetch('/api/v1/assistant/ask', {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ user_id: USER_ID, prompt: text })
            });
            const data = await res.json();
            
            // Xóa trạng thái đang gõ
            document.getElementById(typingId).remove();

            if(data.success) {
                // In câu trả lời của AI
                chatBox.innerHTML += `
                    <div class="flex gap-3 max-w-[90%]">
                        <div class="h-8 w-8 rounded-full bg-blue-600 flex items-center justify-center text-white flex-shrink-0 shadow-lg"><i class="fas fa-robot text-xs"></i></div>
                        <div class="bg-slate-800 p-3 rounded-2xl rounded-tl-sm text-sm text-slate-200 border border-slate-700 shadow-md leading-relaxed">
                            ${data.reply.replace(/\\n/g, '<br>')}
                        </div>
                    </div>
                `;
                // Cập nhật lại số dư Xu ngay lập tức
                document.getElementById('wallet-balance').innerText = data.remaining_xu.toLocaleString('vi-VN');
            } else {
                chatBox.innerHTML += `
                    <div class="flex gap-3 max-w-[85%]">
                        <div class="bg-red-500/20 p-3 rounded-2xl rounded-tl-sm text-sm text-red-400 border border-red-500/30">
                            <i class="fas fa-exclamation-triangle mr-1"></i> ${data.message}
                        </div>
                    </div>
                `;
            }
        } catch (error) {
            document.getElementById(typingId).remove();
            chatBox.innerHTML += `<div class="text-xs text-red-500 text-center my-2">Lỗi mất kết nối mạng.</div>`;
        } finally {
            btnSend.disabled = false;
            scrollToBottom();
        }
    }

    // Mở rộng ô text khi gõ nhiều dòng
    document.getElementById('chat-input').addEventListener('input', function() {
        this.style.height = 'auto';
        this.style.height = (this.scrollHeight) + 'px';
    });

    document.addEventListener('DOMContentLoaded', loadBalance);
</script>
</body>
</html>
