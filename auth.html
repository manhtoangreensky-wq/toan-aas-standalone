<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOAN AAS - Đăng Nhập</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gray-900 text-white font-sans min-h-screen flex items-center justify-center">
    
    <div class="bg-gray-800 p-8 rounded-2xl shadow-2xl w-full max-w-md border border-gray-700">
        <div class="text-center mb-6">
            <i class="fas fa-fingerprint fa-4x text-blue-500 mb-4 animate-pulse"></i>
            <h1 class="text-2xl font-bold">TOAN AAS OS</h1>
            <p class="text-gray-400 text-sm mt-2">Hệ sinh thái AI & Quản trị Doanh nghiệp</p>
        </div>

        <div class="flex mb-6 border-b border-gray-600">
            <button onclick="switchTab('login')" id="tab-login" class="w-1/2 pb-2 font-bold text-blue-500 border-b-2 border-blue-500">Đăng Nhập</button>
            <button onclick="switchTab('register')" id="tab-register" class="w-1/2 pb-2 font-bold text-gray-500 hover:text-gray-300 transition">Đăng Ký</button>
        </div>

        <div class="space-y-5">
            <div>
                <label class="block text-sm font-semibold text-gray-300 mb-2">Tên tài khoản</label>
                <div class="relative">
                    <i class="fas fa-user absolute left-3 top-3 text-gray-500"></i>
                    <input type="text" id="username" class="w-full bg-gray-900 border border-gray-600 rounded-lg py-2 pl-10 pr-4 focus:ring-2 focus:ring-blue-500 outline-none text-white" placeholder="Nhập tên tài khoản...">
                </div>
            </div>
            <div>
                <label class="block text-sm font-semibold text-gray-300 mb-2">Mật khẩu</label>
                <div class="relative">
                    <i class="fas fa-lock absolute left-3 top-3 text-gray-500"></i>
                    <input type="password" id="password" class="w-full bg-gray-900 border border-gray-600 rounded-lg py-2 pl-10 pr-4 focus:ring-2 focus:ring-blue-500 outline-none text-white" placeholder="Nhập mật khẩu...">
                </div>
            </div>

            <button onclick="handleAuth()" id="btn-auth" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-lg shadow-lg transition flex justify-center items-center gap-2">
                <i class="fas fa-sign-in-alt"></i> Vào Hệ Thống
            </button>

            <div id="msg" class="text-center text-sm font-semibold hidden"></div>
        </div>
    </div>

    <script>
        let isLogin = true;

        function switchTab(tab) {
            isLogin = tab === 'login';
            document.getElementById('tab-login').className = isLogin ? "w-1/2 pb-2 font-bold text-blue-500 border-b-2 border-blue-500" : "w-1/2 pb-2 font-bold text-gray-500 hover:text-gray-300 transition";
            document.getElementById('tab-register').className = !isLogin ? "w-1/2 pb-2 font-bold text-blue-500 border-b-2 border-blue-500" : "w-1/2 pb-2 font-bold text-gray-500 hover:text-gray-300 transition";
            document.getElementById('btn-auth').innerHTML = isLogin ? '<i class="fas fa-sign-in-alt"></i> Vào Hệ Thống' : '<i class="fas fa-user-plus"></i> Tạo Tài Khoản';
            document.getElementById('msg').classList.add('hidden');
        }

        async function handleAuth() {
            const user = document.getElementById('username').value;
            const pwd = document.getElementById('password').value;
            const msgBox = document.getElementById('msg');

            if(!user || !pwd) {
                msgBox.innerText = "Vui lòng nhập đủ thông tin!";
                msgBox.className = "text-center text-sm font-semibold text-red-500 block";
                return;
            }

            const endpoint = isLogin ? '/api/v1/auth/login' : '/api/v1/auth/register';
            
            try {
                const res = await fetch(endpoint, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: user, password: pwd })
                });
                const data = await res.json();

                if (data.success) {
                    msgBox.innerText = isLogin ? "Đăng nhập thành công!" : "Đăng ký thành công!";
                    msgBox.className = "text-center text-sm font-semibold text-green-500 block";
                    
                    // Lưu trạng thái đăng nhập vào trình duyệt
                    localStorage.setItem('user_id', data.user_id);
                    localStorage.setItem('role', data.role);
                    
                    setTimeout(() => window.location.href = "/", 1000);
                } else {
                    msgBox.innerText = data.message;
                    msgBox.className = "text-center text-sm font-semibold text-red-500 block";
                }
            } catch (error) {
                msgBox.innerText = "Lỗi kết nối máy chủ!";
                msgBox.className = "text-center text-sm font-semibold text-red-500 block";
            }
        }
    </script>
</body>
</html>
